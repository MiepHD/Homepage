<h1>Sterne</h1>
<img alt="Eine digitale Illustration eines nächtlichen Sternenhimmels auf dunkelblauem, fast schwarzem Hintergrund. Im Zentrum der Darstellung stehen mehrere stilisierte, leuchtend gelbe Sterne mit vier spitzen Zacken, die über die Fläche verteilt sind. Einige dieser Sterne sind von einer diffusen, rötlich schraffierten Aura umgeben. Zwischen den großen Sternen finden sich zahlreiche kleinere, punktförmige Lichtakzente und gelbe Kreise in verschiedenen Größen und Transparenzstufen, die dem Bild Tiefe verleihen. Das gesamte Design wirkt atmosphärisch und leicht verträumt." src="pages/drawings/images/sterne.png" />
<p>
  Diesen Sternenhimmel habe ich im Zusammenhang mit der Gestaltung meines
  Zimmers gezeichnet. Die Zeichnung war das Vorbild für die Wand angrenzend an
  mein Bett.
</p>
