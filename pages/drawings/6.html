<img alt="Eine bunte, handgezeichnete Netzwerk-Grafik auf weißem Grund. Das System ist dezentral organisiert und besteht aus farbigen Knoten, die über schwarze Linien verbunden sind. Besonders auffällig ist die ungleichmäßige Vernetzung: Während einige zentrale „Hubs“ als Sternverteiler viele Verbindungen halten, bilden andere Punkte dichte Cluster oder einfache Ketten. Die Struktur wirkt organisch und erinnert an neuronale Bahnen oder ein komplexes soziales Geflecht ohne starre Hierarchie." src="pages/drawings/images/network.png" />
